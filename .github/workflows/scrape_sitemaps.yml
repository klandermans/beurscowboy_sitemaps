name: Hourly Financial News Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sitemap Aggregator (24h)
        run: python sitemap_aggregator.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Build Historical Archive (Incremental)
        run: python build_historical.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit and Push Results
        run: |
          git config --global user.name "Financial Bot"
          git config --global user.email "bot@github.com"
          # Voeg alle relevante databasebestanden toe (Parquet en JSON)
          git add domains.json sitemaps_list.txt cache_metadata.json page_metadata_cache.json
          git add latest_24h.parquet latest_24h.json
          git add historical_archive.parquet historical_archive.json historical_archive.json.gz
          git add cache_parquet/*.parquet
          
          # Alleen committen als er daadwerkelijk iets veranderd is
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update financial news database (incremental) [skip ci]" && git push)
