name: Hourly Financial News Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sitemap Aggregator (24h)
        run: python sitemap_aggregator.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit and Push Results
        run: |
          git config --global user.name "Financial Bot"
          git config --global user.email "bot@github.com"
          
          # Voeg alleen de 24-uurs database en metadata cache toe
          git add domains.json sitemaps_list.txt cache_metadata.json page_metadata_cache.json
          git add latest_24h.parquet latest_24h.json
          
          # Alleen committen als er daadwerkelijk iets veranderd is
          if ! git diff --cached --quiet; then
            git commit -m "Update news database (24h) [skip ci]"
            git push origin main
          else
            echo "Geen wijzigingen om te committen."
          fi
